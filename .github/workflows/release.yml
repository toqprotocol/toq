name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate tag matches Cargo.toml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! grep -q "version = \"$VERSION\"" Cargo.toml; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version" >&2
            exit 1
          fi
      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --draft --verify-tag --title ${{ github.ref_name }}

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use-cross: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: |
          curl -LO https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz
          tar xf cross-x86_64-unknown-linux-musl.tar.gz
          sudo mv cross /usr/local/bin/

      - name: Build
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binary
        run: |
          BIN="target/${{ matrix.target }}/release/toq"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            docker run --rm -v "$PWD/target:/target:Z" \
              "ghcr.io/cross-rs/${{ matrix.target }}:main" \
              aarch64-linux-gnu-strip "/target/${{ matrix.target }}/release/toq"
          else
            strip "$BIN"
          fi

      - name: Package
        run: |
          ARCHIVE="toq-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$ARCHIVE"
          cp "target/${{ matrix.target }}/release/toq" "$ARCHIVE/"
          cp LICENSE README.md "$ARCHIVE/"
          tar czf "$ARCHIVE.tar.gz" "$ARCHIVE"
          shasum -a 256 "$ARCHIVE.tar.gz" > "$ARCHIVE.tar.gz.sha256"

      - name: Upload to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCHIVE="toq-${{ github.ref_name }}-${{ matrix.target }}"
          gh release upload ${{ github.ref_name }} "$ARCHIVE.tar.gz" "$ARCHIVE.tar.gz.sha256" --clobber

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish toq-core to crates.io
        run: cargo publish -p toq-core || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io to index toq-core
        run: sleep 30

      - name: Publish toq-cli to crates.io
        run: cargo publish -p toq-cli || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}

  update-homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://github.com/toqprotocol/toq/releases/download/$TAG"

          SHA_DARWIN_ARM=$(curl -sL "$BASE/toq-$TAG-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          SHA_DARWIN_X86=$(curl -sL "$BASE/toq-$TAG-x86_64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          SHA_LINUX_ARM=$(curl -sL "$BASE/toq-$TAG-aarch64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')
          SHA_LINUX_X86=$(curl -sL "$BASE/toq-$TAG-x86_64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')

          CLASS_SUFFIX=$(echo "$VERSION" | sed 's/[^a-zA-Z0-9]//g')

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/toqprotocol/homebrew-toq.git" tap
          cd tap
          git config user.name "toq-release-bot"
          git config user.email "release@toq.dev"
          mkdir -p Formula

          cat > Formula/toq.rb << 'RUBY'
          class Toq < Formula
            desc "Secure agent-to-agent communication protocol"
            homepage "https://toq.dev"
            license "Apache-2.0"
          RUBY
          cat >> Formula/toq.rb << EOF
            version "$VERSION"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/toqprotocol/toq/releases/download/v#{version}/toq-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "$SHA_DARWIN_ARM"
              else
                url "https://github.com/toqprotocol/toq/releases/download/v#{version}/toq-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "$SHA_DARWIN_X86"
              end
            elsif OS.linux?
              if Hardware::CPU.arm?
                url "https://github.com/toqprotocol/toq/releases/download/v#{version}/toq-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_LINUX_ARM"
              else
                url "https://github.com/toqprotocol/toq/releases/download/v#{version}/toq-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "$SHA_LINUX_X86"
              end
            end

            def install
              bin.install "toq"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/toq --version")
            end
          end
          EOF

          sed "s/class Toq </class ToqAT${CLASS_SUFFIX} </" Formula/toq.rb > "Formula/toq@${VERSION}.rb"

          git add -A
          git commit -m "update to $VERSION"
          git push
