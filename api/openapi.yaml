openapi: 3.1.0
info:
  title: toq Local API
  description: |
    HTTP API exposed by the toq daemon for SDK and tooling integration.
    The daemon handles all protocol complexity (crypto, TLS, handshake,
    connections, retries, key management). This API is the interface
    between local agent code and the daemon.

    Default bind: 127.0.0.1:9010 (localhost only).
    Localhost-only. No authentication required (OS protects localhost).
  version: 0.1.0-dev.1
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://127.0.0.1:9010
    description: Local daemon (default)

security: []

paths:
  # ── Messages ──────────────────────────────────────────────

  /v1/messages:
    post:
      operationId: sendMessage
      summary: Send a message to one or more remote agents.
      description: |
        When `to` is a string, sends to a single agent. Returns the
        standard response. With wait=true, blocks until the remote
        agent acknowledges receipt.

        When `to` is an array, sends independently to each agent on
        separate threads. Returns per-recipient results. The wait
        parameter is not supported for multi-recipient sends.
      parameters:
        - name: wait
          in: query
          schema:
            type: boolean
            default: false
          description: Block until the remote agent acknowledges receipt (single recipient only).
        - name: timeout
          in: query
          schema:
            type: integer
            default: 30
            minimum: 1
            maximum: 300
          description: Seconds to wait for acknowledgement. Only used when wait=true.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message delivered (single recipient, wait=true) or multi-recipient results.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SendMessageResponse"
                  - $ref: "#/components/schemas/MultiSendResponse"
        "202":
          description: Message accepted for delivery (single recipient, wait=false).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          description: Invalid request or address.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Message body exceeds maximum size.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Cannot reach target agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "504":
          description: Delivery timeout (no ack within timeout).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: streamMessages
      summary: Stream incoming messages via SSE.
      description: |
        Live feed of messages. Includes incoming messages from remote
        agents and outgoing messages sent by this agent. Messages
        received while disconnected are not replayed. Multiple
        concurrent connections are supported. Optional query parameters
        filter the stream server-side.
      parameters:
        - name: from
          in: query
          schema:
            type: string
          description: Filter by sender address or wildcard pattern (e.g. toq://host/*).
        - name: type
          in: query
          schema:
            type: string
          description: Filter by message type (e.g. message.send).
      responses:
        "200":
          description: SSE stream of messages.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/IncomingMessage"

  /v1/messages/history:
    get:
      operationId: messageHistory
      summary: Query stored message history.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Max messages to return.
        - name: from
          in: query
          schema:
            type: string
          description: Filter by sender address (substring match).
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Only messages after this timestamp.
      responses:
        "200":
          description: Stored messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryResponse"

  # ── Streaming ─────────────────────────────────────────────

  /v1/stream/start:
    post:
      operationId: streamStart
      summary: Open a streaming connection to a remote agent.
      description: |
        Opens a TLS connection to the target agent and returns a
        stream ID. Use the stream ID with /v1/stream/chunk and
        /v1/stream/end to send content incrementally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamStartRequest"
      responses:
        "200":
          description: Stream opened.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamStartResponse"
        "400":
          description: Invalid address.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Cannot reach target agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/stream/chunk:
    post:
      operationId: streamChunk
      summary: Send a text chunk on an open stream.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamChunkRequest"
      responses:
        "200":
          description: Chunk sent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamChunkResponse"
        "404":
          description: Stream not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/stream/end:
    post:
      operationId: streamEnd
      summary: End a stream.
      description: |
        Sends a stream end marker. Optionally closes the thread.
        The connection is closed after all ACKs are drained.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreamEndRequest"
      responses:
        "200":
          description: Stream ended.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamChunkResponse"
        "404":
          description: Stream not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Threads ───────────────────────────────────────────────

  /v1/threads/{thread_id}:
    get:
      operationId: getThread
      summary: Get messages in a thread.
      description: |
        Returns messages in the thread. In v1, the daemon does not persist
        messages. SDKs should track thread history client-side from the
        SSE stream.
      parameters:
        - name: thread_id
          in: path
          required: true
          schema:
            type: string
          description: Thread ID.
      responses:
        "200":
          description: Messages in the thread (may be empty in v1).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadResponse"

  # ── Peers ─────────────────────────────────────────────────

  /v1/peers:
    get:
      operationId: listPeers
      summary: List known peers.
      responses:
        "200":
          description: List of peers.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeersResponse"

  /v1/peers/{public_key}/block:
    post:
      operationId: blockPeer
      summary: Block an agent by public key.
      description: Silently drops and permanently rejects the agent.
      parameters:
        - name: public_key
          in: path
          required: true
          schema:
            type: string
          description: Ed25519 public key of the agent to block.
      responses:
        "200":
          description: Agent blocked.
        "400":
          description: Invalid public key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: unblockPeer
      summary: Unblock an agent.
      parameters:
        - name: public_key
          in: path
          required: true
          schema:
            type: string
          description: Ed25519 public key of the agent to unblock.
      responses:
        "200":
          description: Agent unblocked.
        "400":
          description: Invalid public key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Approvals ─────────────────────────────────────────────

  /v1/approvals:
    get:
      operationId: listApprovals
      summary: List pending approval requests.
      responses:
        "200":
          description: Pending approval requests.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalsResponse"

  /v1/approvals/{id}:
    post:
      operationId: resolveApproval
      summary: Approve or deny a pending connection request.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Approval request ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecision"
      responses:
        "200":
          description: Decision applied.
        "404":
          description: Approval request not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/approvals/{id}/revoke:
    post:
      operationId: revokeApproval
      summary: Revoke a previously approved agent.
      description: Removes the agent from the allowed list without blocking. The agent would need to request approval again to reconnect.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Encoded public key of the agent to revoke.
      responses:
        "200":
          description: Approval revoked.
        "404":
          description: Invalid public key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Rule-based permissions ─────────────────────────────────

  /v1/block:
    post:
      operationId: blockRule
      summary: Add a block rule by key or address pattern.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleBody"
      responses:
        "200":
          description: Block rule added.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: unblockRule
      summary: Remove a block rule.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleBody"
      responses:
        "200":
          description: Block rule removed.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/approve:
    post:
      operationId: approveRule
      summary: Add an approve rule by key or address pattern.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleBody"
      responses:
        "200":
          description: Approve rule added.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/revoke:
    post:
      operationId: revokeRule
      summary: Remove an approve rule.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleBody"
      responses:
        "200":
          description: Approve rule removed.
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/permissions:
    get:
      operationId: listPermissions
      summary: List all approved and blocked permission rules.
      responses:
        "200":
          description: Permission rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PermissionsResponse"

  /v1/ping:
    post:
      operationId: pingAgent
      summary: Ping a remote agent to discover its public key.
      description: Connects to the remote agent, completes the handshake to learn its public key, then disconnects. Creates a pending approval on the remote if it is in approval mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [address]
              properties:
                address:
                  type: string
                  description: toq address to ping (e.g. toq://host/name).
      responses:
        "200":
          description: Ping result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PingResponse"
        "400":
          description: Invalid address.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Discovery ─────────────────────────────────────────────

  /v1/discover:
    get:
      operationId: discoverDns
      summary: Discover agents at a host via DNS.
      parameters:
        - name: host
          in: query
          required: true
          schema:
            type: string
          description: Domain to query for toq TXT records.
      responses:
        "200":
          description: Discovered agents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"
        "400":
          description: Missing or invalid host parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/discover/local:
    get:
      operationId: discoverLocal
      summary: Discover agents on the local network via mDNS.
      responses:
        "200":
          description: Discovered local agents.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoverResponse"

  # ── Connections ───────────────────────────────────────────

  /v1/connections:
    get:
      operationId: listConnections
      summary: List active connections.
      responses:
        "200":
          description: Active connections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionsResponse"

  # ── Daemon ────────────────────────────────────────────────

  /v1/health:
    get:
      operationId: healthCheck
      summary: Health check.
      description: Lightweight health probe for load balancers and monitoring.
      responses:
        "200":
          description: Daemon is healthy.
          content:
            text/plain:
              schema:
                type: string
                example: "ok"

  /v1/status:
    get:
      operationId: getStatus
      summary: Get daemon status and identity.
      responses:
        "200":
          description: Daemon status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"

  /v1/daemon/shutdown:
    post:
      operationId: shutdownDaemon
      summary: Gracefully shut down the daemon.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                graceful:
                  type: boolean
                  default: true
                  description: Wait for active threads to finish before stopping.
      responses:
        "200":
          description: Shutdown initiated.

  /v1/logs:
    get:
      operationId: getLogs
      summary: Get log entries.
      description: |
        Returns recent log entries. When follow=true, streams new
        entries in real time via SSE.
      parameters:
        - name: follow
          in: query
          schema:
            type: boolean
            default: false
          description: Stream log entries in real time via SSE.
      responses:
        "200":
          description: Log entries (JSON when follow=false, SSE when follow=true).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogsResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/LogEntry"
    delete:
      operationId: clearLogs
      summary: Delete all log entries.
      responses:
        "200":
          description: Logs cleared.

  # ── Diagnostics ───────────────────────────────────────────

  /v1/diagnostics:
    get:
      operationId: runDiagnostics
      summary: Run diagnostics (port, DNS, keys, disk).
      responses:
        "200":
          description: Diagnostic results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResponse"

  /v1/upgrade/check:
    get:
      operationId: checkUpgrade
      summary: Check for a new version.
      responses:
        "200":
          description: Upgrade check result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeCheckResponse"

  # ── Keys ──────────────────────────────────────────────────

  /v1/keys/rotate:
    post:
      operationId: rotateKeys
      summary: Rotate identity keys.
      description: |
        Generates a new Ed25519 keypair and rotation proof.
        The daemon must be restarted to use the new keys.
      responses:
        "200":
          description: Keys rotated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyRotationResponse"
        "500":
          description: Failed to load or save keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Backup ────────────────────────────────────────────────

  /v1/backup/export:
    post:
      operationId: exportBackup
      summary: Create an encrypted backup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupExportRequest"
      responses:
        "200":
          description: Encrypted backup data.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupExportResponse"
        "400":
          description: Empty passphrase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Cannot read key/config files.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/backup/import:
    post:
      operationId: importBackup
      summary: Restore from an encrypted backup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupImportRequest"
      responses:
        "200":
          description: Backup restored.
        "400":
          description: Invalid backup data or wrong passphrase.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Config ────────────────────────────────────────────────

  /v1/config:
    get:
      operationId: getConfig
      summary: Read current configuration.
      responses:
        "200":
          description: Current config.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
    patch:
      operationId: updateConfig
      summary: Update configuration fields.
      description: |
        Accepts a partial config object. Only provided fields are updated.
        Some changes take effect immediately, others require a daemon restart.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigUpdateRequest"
      responses:
        "200":
          description: Config updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigResponse"
        "400":
          description: Invalid config values.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Agent Card ────────────────────────────────────────────

  /v1/card:
    get:
      operationId: getAgentCard
      summary: Get this agent's card.
      responses:
        "200":
          description: Agent card.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentCard"

  # ── Handlers ──────────────────────────────────────────────

  /v1/handlers:
    get:
      operationId: listHandlers
      summary: List registered message handlers.
      responses:
        "200":
          description: All handlers with active process counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HandlersResponse"
    post:
      operationId: addHandler
      summary: Register a new message handler.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandlerRequest"
      responses:
        "200":
          description: Handler added.
        "409":
          description: Handler name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/handlers/{name}:
    delete:
      operationId: removeHandler
      summary: Remove a handler and stop its active processes.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Handler removed.
        "404":
          description: Handler not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateHandler
      summary: Update a handler's command, filters, or enabled state.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HandlerUpdateRequest"
      responses:
        "200":
          description: Handler updated.
        "404":
          description: Handler not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/handlers/reload:
    post:
      operationId: reloadHandlers
      summary: Reload handlers from handlers.toml.
      responses:
        "200":
          description: Handlers reloaded.

  /v1/handlers/stop:
    post:
      operationId: stopHandler
      summary: Stop active processes for a handler.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                pid:
                  type: integer
                  description: Stop a specific process by PID. Omit to stop all.
      responses:
        "200":
          description: Processes stopped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  stopped:
                    type: integer
                  name:
                    type: string

components:
  schemas:
    # ── Messages ────────────────────────────────────────────

    SendMessageRequest:
      type: object
      required:
        - to
      properties:
        to:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          description: |
            Target agent address (string) or multiple addresses (array).
            When an array, each recipient gets an independent thread.
          example: "toq://peer.example.com/recipe-agent"
        body:
          description: Message content. Structure depends on content_type.
          example: { "text": "What can you make with eggs?" }
        thread_id:
          type: string
          description: Conversation thread ID. Auto-generated if omitted.
        reply_to:
          type: string
          description: ID of the message being replied to.
        content_type:
          type: string
          default: "text/plain"
          description: MIME type of the body.
        close_thread:
          type: boolean
          default: false
          description: Close the thread after sending this message.

    SendMessageResponse:
      type: object
      required:
        - id
        - status
        - thread_id
        - timestamp
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, delivered]
        thread_id:
          type: string
        timestamp:
          type: string
          format: date-time

    MultiSendResult:
      type: object
      required:
        - to
        - id
        - thread_id
        - status
      properties:
        to:
          type: string
          description: Recipient address.
        id:
          type: string
          format: uuid
        thread_id:
          type: string
        status:
          type: string
          enum: [queued, failed]
        error:
          type: string
          description: Error message (only present when status is failed).

    MultiSendResponse:
      type: object
      required:
        - results
        - timestamp
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MultiSendResult"
        timestamp:
          type: string
          format: date-time

    IncomingMessage:
      type: object
      required:
        - id
        - type
        - from
        - timestamp
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: |
            Message type. Values: message.send, thread.close,
            message.stream.chunk, message.stream.end.
          example: "message.send"
        from:
          type: string
          example: "toq://peer.example.com/assistant"
        body:
          description: Message content.
        thread_id:
          type: string
        reply_to:
          type: string
        content_type:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Streaming ───────────────────────────────────────────

    StreamStartRequest:
      type: object
      required:
        - to
      properties:
        to:
          type: string
          description: Target agent address.
        thread_id:
          type: string
          description: Thread ID. Auto-generated if omitted.

    StreamStartResponse:
      type: object
      required:
        - stream_id
        - thread_id
      properties:
        stream_id:
          type: string
        thread_id:
          type: string

    StreamChunkRequest:
      type: object
      required:
        - stream_id
        - text
      properties:
        stream_id:
          type: string
        text:
          type: string

    StreamChunkResponse:
      type: object
      required:
        - chunk_id
      properties:
        chunk_id:
          type: string

    StreamEndRequest:
      type: object
      required:
        - stream_id
      properties:
        stream_id:
          type: string
        text:
          type: string
          description: Optional final text to include with the stream end.
        close_thread:
          type: boolean
          default: false
          description: Close the thread after ending the stream.

    # ── Threads ─────────────────────────────────────────────

    ThreadResponse:
      type: object
      required:
        - thread_id
        - messages
      properties:
        thread_id:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/IncomingMessage"

    # ── Peers ───────────────────────────────────────────────

    Peer:
      type: object
      required:
        - public_key
        - address
        - status
        - last_seen
      properties:
        public_key:
          type: string
          example: "ed25519:abc123..."
        address:
          type: string
          example: "toq://peer.example.com/assistant"
        status:
          type: string
          enum: [connected, seen]
          description: "connected if active session, seen otherwise"
        last_seen:
          type: string
          format: date-time

    PeersResponse:
      type: object
      required:
        - peers
      properties:
        peers:
          type: array
          items:
            $ref: "#/components/schemas/Peer"

    # ── Approvals ───────────────────────────────────────────

    ApprovalRequest:
      type: object
      required:
        - id
        - public_key
        - address
        - requested_at
      properties:
        id:
          type: string
        public_key:
          type: string
        address:
          type: string
        requested_at:
          type: string
          format: date-time

    ApprovalsResponse:
      type: object
      required:
        - approvals
      properties:
        approvals:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalRequest"

    ApprovalDecision:
      type: object
      required:
        - decision
      properties:
        decision:
          type: string
          enum: [approve, deny]

    RuleBody:
      type: object
      description: Specify either key or from (not both).
      properties:
        key:
          type: string
          description: Ed25519 public key.
        from:
          type: string
          description: toq address or wildcard pattern (e.g. toq://host/*, toq://*/name, toq://*).

    PermissionRule:
      type: object
      required: [type, value]
      properties:
        type:
          type: string
          enum: [key, address]
        value:
          type: string

    PermissionsResponse:
      type: object
      required: [approved, blocked]
      properties:
        approved:
          type: array
          items:
            $ref: "#/components/schemas/PermissionRule"
        blocked:
          type: array
          items:
            $ref: "#/components/schemas/PermissionRule"

    PingResponse:
      type: object
      required: [agent_name, address, reachable]
      properties:
        agent_name:
          type: string
        address:
          type: string
        public_key:
          type: string
          nullable: true
        reachable:
          type: boolean
        error:
          type: string

    HistoryResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/IncomingMessage"

    # ── Discovery ───────────────────────────────────────────

    DiscoveredAgent:
      type: object
      required:
        - address
        - public_key
      properties:
        address:
          type: string
        public_key:
          type: string

    DiscoverResponse:
      type: object
      required:
        - agents
      properties:
        agents:
          type: array
          items:
            $ref: "#/components/schemas/DiscoveredAgent"

    # ── Connections ─────────────────────────────────────────

    Connection:
      type: object
      required:
        - session_id
        - peer_address
        - peer_public_key
        - connected_at
        - messages_exchanged
      properties:
        session_id:
          type: string
        peer_address:
          type: string
        peer_public_key:
          type: string
        connected_at:
          type: string
          format: date-time
        messages_exchanged:
          type: integer

    ConnectionsResponse:
      type: object
      required:
        - connections
      properties:
        connections:
          type: array
          items:
            $ref: "#/components/schemas/Connection"

    # ── Status ──────────────────────────────────────────────

    StatusResponse:
      type: object
      required:
        - status
        - address
        - connection_mode
        - active_connections
        - messages_in
        - messages_out
        - error_count
        - backpressure_active
        - version
        - public_key
      properties:
        status:
          type: string
          enum: [running]
        address:
          type: string
          example: "toq://localhost/agent"
        connection_mode:
          type: string
          enum: [open, approval, allowlist, dns-verified]
        active_connections:
          type: integer
        messages_in:
          type: integer
          description: Messages received since daemon started.
        messages_out:
          type: integer
          description: Messages sent since daemon started.
        error_count:
          type: integer
        backpressure_active:
          type: boolean
        version:
          type: string
          example: "0.1.0-dev.1"
        public_key:
          type: string
          example: "ed25519:abc123..."

    # ── Logs ────────────────────────────────────────────────

    LogEntry:
      type: object
      required:
        - timestamp
        - level
        - message
      properties:
        timestamp:
          type: string
          format: date-time
        level:
          type: string
          enum: [error, warn, info, debug]
        message:
          type: string

    LogsResponse:
      type: object
      required:
        - entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/LogEntry"

    # ── Diagnostics ─────────────────────────────────────────

    DiagnosticCheck:
      type: object
      required:
        - name
        - status
      properties:
        name:
          type: string
        status:
          type: string
          enum: [ok, fail]
        detail:
          type: string

    DiagnosticsResponse:
      type: object
      required:
        - checks
        - issues
      properties:
        checks:
          type: array
          items:
            $ref: "#/components/schemas/DiagnosticCheck"
        issues:
          type: integer

    UpgradeCheckResponse:
      type: object
      required:
        - current_version
        - up_to_date
      properties:
        current_version:
          type: string
        up_to_date:
          type: boolean
        latest_version:
          type: string
        download_url:
          type: string

    # ── Keys ────────────────────────────────────────────────

    KeyRotationResponse:
      type: object
      required:
        - old_public_key
        - new_public_key
        - rotation_proof
      properties:
        old_public_key:
          type: string
        new_public_key:
          type: string
        rotation_proof:
          type: string

    # ── Backup ──────────────────────────────────────────────

    BackupExportRequest:
      type: object
      required:
        - passphrase
      properties:
        passphrase:
          type: string

    BackupExportResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: string

    BackupImportRequest:
      type: object
      required:
        - passphrase
        - data
      properties:
        passphrase:
          type: string
        data:
          type: string

    # ── Config ──────────────────────────────────────────────

    ConfigResponse:
      type: object
      required:
        - config
      properties:
        config:
          type: object

    ConfigUpdateRequest:
      type: object
      description: Partial config object. Only provided fields are updated.

    # ── Agent Card ──────────────────────────────────────────

    AgentCard:
      type: object
      required:
        - name
        - public_key
        - protocol_version
      properties:
        name:
          type: string
        description:
          type: string
        public_key:
          type: string
        protocol_version:
          type: string
          example: "0.1"
        capabilities:
          type: array
          items:
            type: string
        accept_files:
          type: boolean
        max_file_size:
          type: integer
        max_message_size:
          type: integer
        connection_mode:
          type: string

    # ── Handlers ────────────────────────────────────────────

    HandlerRequest:
      type: object
      required:
        - name
        - command
      properties:
        name:
          type: string
        command:
          type: string
        filter_from:
          type: array
          items:
            type: string
        filter_key:
          type: array
          items:
            type: string
        filter_type:
          type: array
          items:
            type: string

    HandlerUpdateRequest:
      type: object
      properties:
        command:
          type: string
        enabled:
          type: boolean
        filter_from:
          type: array
          items:
            type: string
        filter_key:
          type: array
          items:
            type: string
        filter_type:
          type: array
          items:
            type: string

    HandlerEntry:
      type: object
      properties:
        name:
          type: string
        command:
          type: string
        enabled:
          type: boolean
        active:
          type: integer
        filter_from:
          type: array
          items:
            type: string
        filter_key:
          type: array
          items:
            type: string
        filter_type:
          type: array
          items:
            type: string

    HandlersResponse:
      type: object
      properties:
        handlers:
          type: array
          items:
            $ref: "#/components/schemas/HandlerEntry"

    # ── Error ───────────────────────────────────────────────

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - invalid_request
                - invalid_address
                - not_found
                - not_reachable
                - delivery_timeout
                - message_too_large
                - invalid_passphrase
                - invalid_config
            message:
              type: string
